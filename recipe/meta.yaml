{% set name = "emc2" %}
{% set version = "1.3.6" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/emc2-{{ version }}.tar.gz
  sha256: ec446bfdca1cc0e4faeef4b504807ca8d8429ee66b3786ed2970690779e47fe9

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python >={{ python_min }}
  run:
    - python >={{ python_min }}
    - xarray
    - matplotlib-base
    - dask
    - pint
    - act-atmos
    - openpyxl
    - cython
    - numpy
    - nc-time-axis
test:
  imports:
    - emc2
    - emc2.core
  commands:
    - pip install icartt
    - pip check
  requires:
    - pip

about:
  home: https://github.com/columncolab/EMC2
  summary: An open source framework for atmospheric model and observational column comparison.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rcjackson
    - mgrover1
    - isilber
